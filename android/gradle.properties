org.gradle.jvmargs=-Xmx4G
android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=35
# Esta línea evita el error de AGP 9 / newDsl:
android.experimental.force.newDsl=false
# Aumentar el tiempo de espera a niveles extremos (500 segundos)
systemProp.org.gradle.internal.http.connectionTimeout=500000
systemProp.org.gradle.internal.http.socketTimeout=500000
# Evitar descargas paralelas que saturan conexiones débiles
org.gradle.parallel=false
# Mantener el proceso vivo para reintentar más rápido
org.gradle.daemon=true